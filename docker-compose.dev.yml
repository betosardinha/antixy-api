x-app-base: &app-base
  image: antixy-api
  build:
    context: .
    dockerfile: Dockerfile.dev
  volumes:
    - .:/app
    - go-mod-cache:/go/pkg/mod
    - go-build-cache:/root/.cache/go-build
  working_dir: /app
  env_file:
    - .env.dev

services:
  db:
    image: postgres:16
    container_name: antixy-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antixy-dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: antixy-redis
    ports:
      - "6379:6379"

  api:
    <<: *app-base
    container_name: antixy-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  migrate:
    <<: *app-base
    container_name: antixy-migrate
    depends_on:
      db:
        condition: service_healthy

  lint:
    image: golangci/golangci-lint:v2.12.1-alpine
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - golangci-cache:/root/.cache/golangci-lint
    working_dir: /app
    command: golangci-lint run ./... --timeout=3m

  pgadmin:
    image: elestio/pgadmin:REL-9_14
    container_name: antixy-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@postgres.com
      PGADMIN_DEFAULT_PASSWORD: postgres
      PGADMIN_LISTEN_PORT: 5050
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json

volumes:
  db_data:
  pgadmin_data:
  go-mod-cache:
  go-build-cache:
  golangci-cache: