name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s v2.12.1
      - name: Run Lint
        run: ./bin/golangci-lint run ./... --timeout=3m

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      GOCACHE: /tmp/go-build
      GOMODCACHE: /tmp/go-mod
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: Cache Go build/mod
        uses: actions/cache@v4
        with:
          path: |
            /tmp/go-build
            /tmp/go-mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run Tests (fast + coverage)
        run: |
          go test ./... \
            -json \
            -covermode=atomic \
            -coverprofile=coverage.out
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: true
          verbose: true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: Build API binary
        run: |
          go build -v -ldflags="-s -w" -o bin/api ./cmd/api
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary
          path: bin/api